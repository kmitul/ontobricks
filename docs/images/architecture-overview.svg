    <text x="90" y="315" font-size="11" font-weight="600" fill="white">SERVICES LAYER</text>
    <text x="90" y="333" font-size="9" fill="rgba(255,255,255,0.8)">Business logic + task orchestration</text>
    
    <rect x="250" y="305" width="120" height="30" rx="3" fill="white" fill-opacity="0.25"/>
    <text x="310" y="325" text-anchor="middle" font-size="9" fill="white">ProjectSession</text>
    
    <rect x="385" y="305" width="120" height="30" rx="3" fill="white" fill-opacity="0.25"/>
    <text x="445" y="325" text-anchor="middle" font-size="9" fill="white">ontology/service</text>
    
    <rect x="520" y="305" width="120" height="30" rx="3" fill="white" fill-opacity="0.25"/>
