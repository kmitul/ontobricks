    <text x="90" y="268" font-size="9" fill="rgba(255,255,255,0.8)">Thin HTTP handlers (APIRouter)</text>
    
    <rect x="250" y="240" width="75" height="30" rx="3" fill="white" fill-opacity="0.25"/>
    <text x="287" y="260" text-anchor="middle" font-size="9" fill="white">home</text>
    
    <rect x="335" y="240" width="75" height="30" rx="3" fill="white" fill-opacity="0.25"/>
    <text x="372" y="260" text-anchor="middle" font-size="9" fill="white">config</text>
    
    <rect x="420" y="240" width="75" height="30" rx="3" fill="white" fill-opacity="0.25"/>
    <text x="457" y="260" text-anchor="middle" font-size="9" fill="white">ontology</text>
    
    <rect x="505" y="240" width="75" height="30" rx="3" fill="white" fill-opacity="0.25"/>
    <text x="542" y="260" text-anchor="middle" font-size="9" fill="white">mapping</text>
    
    <rect x="590" y="240" width="75" height="30" rx="3" fill="white" fill-opacity="0.25"/>
    <text x="627" y="260" text-anchor="middle" font-size="9" fill="white">dtwin</text>
    
    <rect x="675" y="240" width="75" height="30" rx="3" fill="white" fill-opacity="0.25"/>
    <text x="712" y="260" text-anchor="middle" font-size="9" fill="white">project</text>
    
    <rect x="760" y="240" width="75" height="30" rx="3" fill="white" fill-opacity="0.25"/>
    <text x="797" y="260" text-anchor="middle" font-size="9" fill="white">graphql</text>
    
    <rect x="845" y="240" width="55" height="30" rx="3" fill="white" fill-opacity="0.25"/>
    <text x="872" y="260" text-anchor="middle" font-size="9" fill="white">api/v1</text>
    
