    <text x="710" y="705" text-anchor="middle" font-size="12" font-weight="600" fill="white">SQL Warehouse</text>
    <rect x="520" y="720" width="380" height="30" rx="3" fill="white" fill-opacity="0.1"/>
    <text x="710" y="740" text-anchor="middle" font-size="9" fill="white">Spark SQL Engine + Photon Acceleration</text>
    <rect x="520" y="755" width="380" height="30" rx="3" fill="white" fill-opacity="0.1"/>
    <text x="710" y="775" text-anchor="middle" font-size="9" fill="white">Delta table storage for triple store backend</text>
  </g>
  
  <!-- Legend -->
  <rect x="50" y="56" width="10" height="10" rx="2" fill="url(#uiGrad)"/>
