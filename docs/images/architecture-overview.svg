    <rect x="50" y="645" width="880" height="185" rx="8" fill="url(#dbGrad)"/>
    <text x="480" y="670" text-anchor="middle" font-size="14" font-weight="bold" fill="white">DATABRICKS PLATFORM</text>
    
    <!-- Unity Catalog -->
