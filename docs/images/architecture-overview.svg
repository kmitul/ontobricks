    <rect x="212" y="545" width="70" height="28" rx="3" fill="white" fill-opacity="0.2"/>
    <text x="247" y="563" text-anchor="middle" font-size="8" fill="white">SQL Wizard</text>
    
    <rect x="95" y="578" width="85" height="28" rx="3" fill="white" fill-opacity="0.2"/>
