    <text x="280" y="705" text-anchor="middle" font-size="12" font-weight="600" fill="white">Unity Catalog</text>
    
    <rect x="90" y="720" width="80" height="35" rx="3" fill="white" fill-opacity="0.25"/>
    <text x="130" y="742" text-anchor="middle" font-size="9" fill="white">Catalogs</text>
    
    <rect x="185" y="720" width="80" height="35" rx="3" fill="white" fill-opacity="0.25"/>
    <text x="225" y="742" text-anchor="middle" font-size="9" fill="white">Schemas</text>
    
    <rect x="280" y="720" width="80" height="35" rx="3" fill="white" fill-opacity="0.25"/>
    <text x="320" y="742" text-anchor="middle" font-size="9" fill="white">Tables</text>
    
    <rect x="375" y="720" width="80" height="35" rx="3" fill="white" fill-opacity="0.25"/>
    <text x="415" y="742" text-anchor="middle" font-size="9" fill="white">Volumes</text>
    
    <text x="280" y="790" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Metadata management · Access control · Governance</text>
    
    <!-- SQL Warehouse -->
