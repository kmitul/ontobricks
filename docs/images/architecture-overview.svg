    <text x="805" y="520" text-anchor="middle" font-size="12" font-weight="bold" fill="white">UC VOLUME (REGISTRY)</text>
    <text x="805" y="535" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Instance-level shared storage</text>
    
    <rect x="695" y="545" width="105" height="28" rx="3" fill="white" fill-opacity="0.2"/>
    <text x="747" y="563" text-anchor="middle" font-size="8" fill="white">.global_config.json</text>
    
    <rect x="810" y="545" width="105" height="28" rx="3" fill="white" fill-opacity="0.2"/>
    <text x="862" y="563" text-anchor="middle" font-size="8" fill="white">.permissions.json</text>
    
    <rect x="695" y="578" width="105" height="28" rx="3" fill="white" fill-opacity="0.2"/>
    <text x="747" y="596" text-anchor="middle" font-size="8" fill="white">.registry marker</text>
    
    <rect x="810" y="578" width="105" height="28" rx="3" fill="white" fill-opacity="0.2"/>
    <text x="862" y="596" text-anchor="middle" font-size="8" fill="white">Project versions</text>
  </g>
  
