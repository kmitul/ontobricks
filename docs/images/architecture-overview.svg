    <text x="170" y="520" text-anchor="middle" font-size="13" font-weight="bold" fill="white">LLM AGENTS</text>
    <text x="170" y="535" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">MLflow-traced agentic loops</text>
    
    <rect x="58" y="545" width="70" height="28" rx="3" fill="white" fill-opacity="0.2"/>
    <text x="93" y="563" text-anchor="middle" font-size="8" fill="white">OWL Generator</text>
    
    <rect x="135" y="545" width="70" height="28" rx="3" fill="white" fill-opacity="0.2"/>
