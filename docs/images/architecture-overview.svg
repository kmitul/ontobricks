    <rect x="310" y="495" width="350" height="115" rx="8" fill="url(#tsGrad)"/>
    <text x="485" y="520" text-anchor="middle" font-size="13" font-weight="bold" fill="white">TRIPLE STORE BACKENDS</text>
    <text x="485" y="535" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Interchangeable per project</text>
    
    <rect x="325" y="545" width="150" height="55" rx="4" fill="white" fill-opacity="0.2"/>
    <text x="400" y="565" text-anchor="middle" font-size="10" font-weight="600" fill="white">Delta</text>
    <text x="400" y="580" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.8)">SQL Warehouse</text>
    <text x="400" y="592" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.8)">Spark SQL</text>
    
    <rect x="495" y="545" width="150" height="55" rx="4" fill="white" fill-opacity="0.2"/>
    <text x="570" y="565" text-anchor="middle" font-size="10" font-weight="600" fill="white">Lakebase</text>
    <text x="570" y="580" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.8)">Managed Postgres</text>
    <text x="570" y="592" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.8)">SQL · UC-synced</text>
  </g>
  
  <!-- Arrow FastAPI to Triple Store -->
