    <text x="835" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="white">MCP SERVER</text>
    <text x="835" y="103" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">mcp-ontobricks App</text>
    
    <rect x="755" y="115" width="160" height="35" rx="4" fill="white" fill-opacity="0.2"/>
    <text x="835" y="130" text-anchor="middle" font-size="9" fill="white">KG Tools for LLMs</text>
    <text x="835" y="143" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.7)">Claude, Cursor, Playground</text>
  </g>
  
