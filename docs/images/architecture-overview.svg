    <text x="417" y="403" text-anchor="middle" font-size="9" fill="white">W3C Standards</text>
    <text x="417" y="416" text-anchor="middle" font-size="7" fill="rgba(255,255,255,0.7)">OWL / R2RML / SPARQL / SHACL</text>
    
