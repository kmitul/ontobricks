    <text x="535" y="416" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.7)">Delta + Lakebase</text>
    
    <rect x="600" y="388" width="100" height="35" rx="3" fill="white" fill-opacity="0.25"/>
    <text x="650" y="403" text-anchor="middle" font-size="9" fill="white">Registry</text>
    <text x="650" y="416" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.7)">Perms + Scheduler</text>
    
    <rect x="795" y="388" width="110" height="35" rx="3" fill="white" fill-opacity="0.25"/>
    <text x="850" y="403" text-anchor="middle" font-size="9" fill="white">GraphQL</text>
    <text x="850" y="416" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.7)">Schema + Resolvers</text>
    
    <rect x="250" y="428" width="100" height="35" rx="3" fill="white" fill-opacity="0.25"/>
    <text x="300" y="443" text-anchor="middle" font-size="9" fill="white">Reasoning</text>
    <text x="300" y="456" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.7)">OWL RL + SWRL</text>
    
    <rect x="360" y="428" width="115" height="35" rx="3" fill="white" fill-opacity="0.25"/>
    <text x="417" y="443" text-anchor="middle" font-size="9" fill="white">Industry</text>
    <text x="417" y="456" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.7)">FIBO / CDISC / IOF</text>
  </g>
  
