  <!-- Arrow FastAPI to Agents -->
  <path d="M170 475 L170 490" stroke="#95a5a6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="200" y="487" font-size="9" fill="#7f8c8d">LLM calls</text>
  
