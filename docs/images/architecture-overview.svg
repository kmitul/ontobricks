<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 855" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="uiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fastapiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#009688;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00796B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E67E22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D35400;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tsGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8E44AD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6C3483;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2980B9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1F618D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mcpGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#16A085;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0E6655;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#95a5a6"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="960" height="855" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="480" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">OntoBricks Architecture</text>
  
  <!-- UI Layer -->
  <g filter="url(#shadow)">
    <rect x="50" y="60" width="660" height="100" rx="8" fill="url(#uiGrad)"/>
    <text x="380" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="white">USER INTERFACE</text>
    <text x="380" y="103" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.85)">Bootstrap 5.3 + OntoViz + Sigma.js + Graphology + D3.js</text>
    
    <rect x="70" y="115" width="76" height="35" rx="4" fill="white" fill-opacity="0.2"/>
    <text x="108" y="137" text-anchor="middle" font-size="9" fill="white">OntoViz Designer</text>
    
    <rect x="152" y="115" width="76" height="35" rx="4" fill="white" fill-opacity="0.2"/>
    <text x="190" y="137" text-anchor="middle" font-size="9" fill="white">Mapping Editor</text>
    
    <rect x="234" y="115" width="76" height="35" rx="4" fill="white" fill-opacity="0.2"/>
    <text x="272" y="137" text-anchor="middle" font-size="9" fill="white">Query / Sync</text>
    
    <rect x="316" y="115" width="76" height="35" rx="4" fill="white" fill-opacity="0.2"/>
    <text x="354" y="137" text-anchor="middle" font-size="9" fill="white">Knowledge Graph</text>
    
    <rect x="398" y="115" width="76" height="35" rx="4" fill="white" fill-opacity="0.2"/>
    <text x="436" y="137" text-anchor="middle" font-size="9" fill="white">Data Quality</text>
    
    <rect x="480" y="115" width="76" height="35" rx="4" fill="white" fill-opacity="0.2"/>
    <text x="518" y="137" text-anchor="middle" font-size="9" fill="white">Settings</text>
    
    <rect x="562" y="115" width="76" height="35" rx="4" fill="white" fill-opacity="0.2"/>
    <text x="600" y="137" text-anchor="middle" font-size="9" fill="white">GraphiQL</text>
  </g>
  
  <!-- MCP Server (right side) -->
