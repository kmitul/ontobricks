<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 900" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="sparqlGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8E44AD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="r2rmlGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980B9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="swrlGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0392B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="owlGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ECC71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27AE60;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shaclGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1ABC9C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16A085;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rdfGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E67E22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D35400;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="relGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34495E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C3E50;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="700" height="900" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="350" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">Semantic Web Standards Stack</text>
  
  <!-- SPARQL Layer -->
  <g filter="url(#shadow)">
    <rect x="50" y="55" width="600" height="90" rx="6" fill="url(#sparqlGrad)"/>
    <text x="350" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="white">SPARQL Query Layer</text>
    <rect x="70" y="90" width="560" height="45" rx="4" fill="white" fill-opacity="0.15"/>
    <text x="350" y="110" text-anchor="middle" font-size="10" fill="white" font-family="Consolas, monospace">SELECT ?person ?dept WHERE { ?person :worksIn ?dept }</text>
    <text x="350" y="125" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Used internally by OntoBricks · Translated to SQL automatically</text>
  </g>
  
  <!-- Arrow SPARQL -> R2RML -->
  <path d="M350 145 L350 160" stroke="#95a5a6" stroke-width="2"/>
  <polygon points="345,155 355,155 350,165" fill="#95a5a6"/>
  
  <!-- R2RML Layer -->
  <g filter="url(#shadow)">
    <rect x="50" y="165" width="600" height="100" rx="6" fill="url(#r2rmlGrad)"/>
    <text x="350" y="190" text-anchor="middle" font-size="14" font-weight="bold" fill="white">R2RML Mapping Layer</text>
    <rect x="70" y="200" width="180" height="55" rx="4" fill="white" fill-opacity="0.15"/>
    <text x="160" y="220" text-anchor="middle" font-size="10" font-weight="600" fill="white">TriplesMap</text>
    <text x="160" y="238" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">Table -> RDF Triples</text>
    
    <rect x="260" y="200" width="180" height="55" rx="4" fill="white" fill-opacity="0.15"/>
    <text x="350" y="220" text-anchor="middle" font-size="10" font-weight="600" fill="white">SubjectMap</text>
    <text x="350" y="238" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">Row -> Entity URI</text>
    
    <rect x="450" y="200" width="180" height="55" rx="4" fill="white" fill-opacity="0.15"/>
    <text x="540" y="220" text-anchor="middle" font-size="10" font-weight="600" fill="white">PredicateObjectMap</text>
    <text x="540" y="238" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">Column -> Property</text>
  </g>
  
  <!-- Arrow R2RML -> SWRL -->
  <path d="M350 265 L350 280" stroke="#95a5a6" stroke-width="2"/>
  <polygon points="345,275 355,275 350,285" fill="#95a5a6"/>
  
  <!-- SWRL / Reasoning Layer -->
  <g filter="url(#shadow)">
    <rect x="50" y="285" width="600" height="100" rx="6" fill="url(#swrlGrad)"/>
    <text x="350" y="308" text-anchor="middle" font-size="14" font-weight="bold" fill="white">SWRL / OWL 2 RL Reasoning Layer</text>
    <rect x="70" y="316" width="180" height="45" rx="4" fill="white" fill-opacity="0.15"/>
    <text x="160" y="334" text-anchor="middle" font-size="10" font-weight="600" fill="white">SWRL Rules</text>
    <text x="160" y="349" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">IF-THEN inference</text>
    
    <rect x="260" y="316" width="180" height="45" rx="4" fill="white" fill-opacity="0.15"/>
    <text x="350" y="334" text-anchor="middle" font-size="10" font-weight="600" fill="white">OWL 2 RL</text>
    <text x="350" y="349" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">T-Box closure</text>
    
    <rect x="450" y="316" width="180" height="45" rx="4" fill="white" fill-opacity="0.15"/>
    <text x="540" y="334" text-anchor="middle" font-size="10" font-weight="600" fill="white">Inferred Triples</text>
    <text x="540" y="349" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">Materialization</text>
    
    <text x="350" y="378" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.8)">Automatic inference — rules executed on graph or translated to SQL/Cypher</text>
  </g>
  
  <!-- Arrow SWRL -> OWL -->
  <path d="M350 385 L350 400" stroke="#95a5a6" stroke-width="2"/>
  <polygon points="345,395 355,395 350,405" fill="#95a5a6"/>
  
  <!-- OWL Layer -->
  <g filter="url(#shadow)">
    <rect x="50" y="405" width="600" height="100" rx="6" fill="url(#owlGrad)"/>
    <text x="350" y="430" text-anchor="middle" font-size="14" font-weight="bold" fill="white">OWL/RDFS Ontology Layer</text>
    <rect x="70" y="440" width="145" height="55" rx="4" fill="white" fill-opacity="0.15"/>
    <text x="142" y="460" text-anchor="middle" font-size="10" font-weight="600" fill="white">owl:Class</text>
    <text x="142" y="478" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">Person, Dept</text>
    
    <rect x="225" y="440" width="145" height="55" rx="4" fill="white" fill-opacity="0.15"/>
    <text x="297" y="460" text-anchor="middle" font-size="10" font-weight="600" fill="white">ObjectProperty</text>
    <text x="297" y="478" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">worksIn, manages</text>
    
    <rect x="380" y="440" width="145" height="55" rx="4" fill="white" fill-opacity="0.15"/>
    <text x="452" y="460" text-anchor="middle" font-size="10" font-weight="600" fill="white">DataProperty</text>
    <text x="452" y="478" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">name, email</text>
    
    <rect x="535" y="440" width="95" height="55" rx="4" fill="white" fill-opacity="0.15"/>
    <text x="582" y="460" text-anchor="middle" font-size="10" font-weight="600" fill="white">Hierarchy</text>
    <text x="582" y="478" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">subClassOf</text>
  </g>
  
  <!-- Arrow OWL -> SHACL -->
  <path d="M350 505 L350 520" stroke="#95a5a6" stroke-width="2"/>
  <polygon points="345,515 355,515 350,525" fill="#95a5a6"/>
  
  <!-- SHACL Layer -->
  <g filter="url(#shadow)">
    <rect x="50" y="525" width="600" height="100" rx="6" fill="url(#shaclGrad)"/>
    <text x="350" y="548" text-anchor="middle" font-size="14" font-weight="bold" fill="white">SHACL Validation Layer</text>
    <rect x="70" y="556" width="130" height="45" rx="4" fill="white" fill-opacity="0.15"/>
    <text x="135" y="574" text-anchor="middle" font-size="10" font-weight="600" fill="white">sh:PropertyShape</text>
    <text x="135" y="589" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">Cardinality, datatype</text>
    
    <rect x="210" y="556" width="130" height="45" rx="4" fill="white" fill-opacity="0.15"/>
    <text x="275" y="574" text-anchor="middle" font-size="10" font-weight="600" fill="white">sh:NodeShape</text>
    <text x="275" y="589" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">Class constraints</text>
    
    <rect x="350" y="556" width="130" height="45" rx="4" fill="white" fill-opacity="0.15"/>
    <text x="415" y="574" text-anchor="middle" font-size="10" font-weight="600" fill="white">sh:sparql</text>
    <text x="415" y="589" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">Custom SPARQL rules</text>
    
    <rect x="490" y="556" width="140" height="45" rx="4" fill="white" fill-opacity="0.15"/>
    <text x="560" y="574" text-anchor="middle" font-size="10" font-weight="600" fill="white">sh:severity</text>
    <text x="560" y="589" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">Violation reporting</text>
    
    <text x="350" y="618" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.8)">Data quality shapes — compiled to SQL or evaluated in-memory</text>
  </g>
  
  <!-- Arrow SHACL -> RDF -->
  <path d="M350 625 L350 640" stroke="#95a5a6" stroke-width="2"/>
  <polygon points="345,635 355,635 350,645" fill="#95a5a6"/>
  
  <!-- RDF Layer -->
  <g filter="url(#shadow)">
    <rect x="50" y="645" width="600" height="80" rx="6" fill="url(#rdfGrad)"/>
    <text x="350" y="670" text-anchor="middle" font-size="14" font-weight="bold" fill="white">RDF Data Layer</text>
    <rect x="70" y="680" width="560" height="35" rx="4" fill="white" fill-opacity="0.15"/>
    <text x="350" y="700" text-anchor="middle" font-size="10" fill="white" font-family="Consolas, monospace">(Subject, Predicate, Object) -> (:Person/P001, :worksIn, :Dept/D001)</text>
    <text x="640" y="665" font-size="9" fill="rgba(255,255,255,0.8)">Turtle .ttl</text>
  </g>
  
  <!-- Arrow RDF -> Storage -->
  <path d="M350 725 L350 740" stroke="#95a5a6" stroke-width="2"/>
  <polygon points="345,735 355,735 350,745" fill="#95a5a6"/>
  
  <!-- Storage Layer (expanded for triple store backends) -->
  <g filter="url(#shadow)">
    <rect x="50" y="745" width="600" height="155" rx="6" fill="url(#relGrad)"/>
    <text x="350" y="770" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Storage Layer</text>
    <text x="350" y="788" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">Triple Store Backends (interchangeable)</text>
    
    <!-- Delta -->
    <rect x="70" y="800" width="265" height="85" rx="4" fill="white" fill-opacity="0.15"/>
    <text x="202" y="820" text-anchor="middle" font-size="11" font-weight="600" fill="white">Delta</text>
    <text x="202" y="838" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">SQL Warehouse</text>
    <text x="202" y="852" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.7)">Spark SQL · Delta table</text>
    <text x="202" y="865" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.7)">UC-governed</text>
    
    <!-- Lakebase -->
    <rect x="355" y="800" width="275" height="85" rx="4" fill="white" fill-opacity="0.15"/>
    <text x="492" y="820" text-anchor="middle" font-size="11" font-weight="600" fill="white">Lakebase</text>
    <text x="492" y="838" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">Managed Postgres</text>
    <text x="492" y="852" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.7)">SQL · App- or Lakeflow-managed</text>
    <text x="492" y="865" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.7)">UC-governed</text>
  </g>
</svg>
